---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-kpi-exporter
  namespace: free5gc
  labels:
    app: kpi-exporter
spec:
  selector:
    matchLabels:
      app: kpi-exporter
  replicas: 1
  template:
    metadata:
      labels:
        app: kpi-exporter
    spec:
      containers:
      
      - image: ghcr.io/niloysh/kpi-exporter:v1.2.0
        name: kpi-exporter
        imagePullPolicy: Always
        ports:
        - name: metrics
          containerPort: 9000

        command: [ "/bin/bash", "-c", "--" ]
        args:
        - |
          if [ "$DEBUG_MODE" = "true" ]; then
            while true; do sleep 30; done;
          else
            python -u kpi-exporter.py
          fi

        env:
          - name: UPDATE_PERIOD
            value: "5"
          - name: DEBUG_MODE
            value: "false"

      restartPolicy: Always
